<div class="container login-container">
  <form (ngSubmit)="login()" class="card login-box">

    <h2 class="text-center">Login</h2>

    <input class="input" type="email" [(ngModel)]="email" name="email" placeholder="Email" />

    <input class="input" type="password" [(ngModel)]="password" name="password" placeholder="Password" />

    <button class="btn" type="submit" [disabled]="loading">
      {{ loading ? 'Logging in...' : 'Login' }}
    </button>

    <p class="error" *ngIf="error">{{ error }}</p>

    <p class="register-text">
      Don't have an account?
      <a class="link" routerLink="/register">Register</a>
    </p>

  </form>
</div>
